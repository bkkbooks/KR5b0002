front:
  text: 洞玄靈寶自然九天生神章經人二
  hash: sha256:091306d7038842eec33598d54f4abe57d92242deefbf88fa96b7e38850882356
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0002_HFL_000-001a, image: hfl/0165/0165-014.png}
body:
  text: 三寶大有金書天寶君者則大洞之尊神天寶丈人則天寶君之祖氣也丈人是混洞太無元髙上玉虛之氣九萬九千九百九十億萬氣後至龍漢元年化生天寶君出書時號髙上大有玉清宫靈寶君者則洞玄之尊神靈寶丈人則靈寶君之祖氣也丈人是赤混太無元玄上紫虛之氣九萬九千九百九十九萬氣後至龍漢開圖化生靈寶君經一劫至赤明元年出書度人時號上清玄都玉京七寶紫微宫神寶君者則洞神之尊神神寶丈人則神寶君之祖氣也丈人是冥寂玄通元無上清虛之氣九萬九千九百九十萬氣後至赤明元年化生神寶君經二劫至上皇元年出書時號三皇洞神太清太極宫此三號雖年殊號異本同一也分為玄元始三氣而治三寶皆三氣之尊神號生三氣三號合生九氣九氣出乎太空之先隱乎空洞之中無光無象無形無名無色無緒無音無聲導運御世開闢玄通三色混沌乍存乍亡運推數極三氣開光氣清髙澄積陽成天氣結凝滓積滯成地九氣列正日月星宿隂陽五行人民品物並受生成天地萬化自非三元所育九氣所導莫能生也三氣為天地之尊九氣為萬物之根故三合成德天地之極也人之受生於胞胎之中三元育養九氣結形故九月神布氣滿能聲聲尚神具九天稱慶太一執符帝君品命主録勒籍司命定算五帝監生聖母衛房天神地祇三界備守九天司馬在庭東向讀九天生神寶章九過男則萬神唱恭女則萬神唱奉男則司命敬諸女則司命敬順於是而生九天司馬不下命章萬神不唱恭諾終不生也夫人得還生於人道濯形太陽驚天駭地貴亦難勝天真地神三界齊臨亦不輕也當生之時亦不為陋也所以能愛其形保其神貴其氣固其根終不死壞而得神仙骨肉同飛上登三清是與三氣合德九氣齊并也但人得生而自不能尊其氣貴其形寶其命愛其神自取死壞離其本真耳九天生神章乃三洞飛玄之氣三合成音結成靈文混合百神隱韻內名生氣結形自然之章天寶誦之以開天地之光靈寶誦之以開九幽長夜之魂神寶誦之以制萬靈太一誦之以具身神帝君誦之以結形九天誦之以生人學士誦之以升天鬼靈聞之以升遷几夫聞之以長存幽魂聞之以開度枯朽聞之以發煙嬰孩聞之以能言死骸聞之以還人三寶神奧萬品生根故非鬼神所知凡夫所聞也夫學上道希慕神仙及得尸解滅度轉輪終歸仙道形與神同不相逺離俱入道真而無此文則胞胎結滯死氣固根真景不守生氣無津九戶閡塞體不生神徒受一形若寄氣而行學得此法可坐致自然三寶尊重九天至真祕之大有九重金格紫陽玉臺自非天地一開其文不出元始禁書非鬼神所聞𥨸之者風刀萬劫魂死無生依科遵奉形神同仙三元宫中宿有金名紫字劉書來生應為三清神仙之人當得此文有其緣會當齎金寶奉師效心依科盟受閉心奉行愼勿輕泄風刀考身修行之法千日長齋不關人事諸塵漏盡夷心默念清香執戒入室東向叩齒九通調聲正氣誦詠寶章誦之一過聲聞九天誦之二過天地設恭誦之三過三界禮房誦之四過天王降仙誦之五過五帝朝真誦之六過魔王束身誦之七過星宿停關誦之八過幽夜光明誦之九過諸天下臨一切神靈莫不衛軒一過徹天胞原宣通二過響地胎結解根三過神禮魂門練仙四過天王降仙魄戶閉關五過五帝朝真藏府清涼六過魔王伏諾胃管生津七過星宿朗明孔竅開聽八過幽夜顯光三部八景整具形神九過諸天下臨三關五藏六府九宫金樓玉室十二重門紫戶玉閣三萬六千關節根源本始一時生神九過為一遍一遍周竟二界舉名五帝友别稱為真人十遍通氣制御萬靈魔王保舉列上諸天百遍通神坐致自然太一度符元君受生千遍通靈坐在立亡仙童玉女役使東西萬遍道備馳騁龍駕白日登晨元始天尊時靜處間居偃息雲宫黃房之內七寶幃中熙夷養素空碧練真耽咀洞慧俯研生神理微太混嘯朗九天是時飛天大聖無極神王玉輔上宰四協侍晨清齋建節侍在側焉憑瓊顏而妙感仰靈眸而開襟𥨸神章而踴躍餐天音而蒙生敢乘機而悟會冒靈盻而披心於是飛天大聖無極神王前進作禮稽首而言上白天尊賤臣幸會得仰侍靈軒不以短狹叨濯冥津重悟凝玄位登神王總御生死領括天仙賞監七覺逺覽遐方雍觀上宰對司侍晨方當乘機應會履九太陽洞理隂符撫掌兆民大運將期數終甲申洪流蕩穢凶災彌天三官鼓筆料别種人考算功過善惡當分自赤明以來至上皇元年依元陽玉匱受度者應二十四萬人開皇以後數至甲申諸天選序仙曹空廢官僚不充遊散職司皆應選人依元陽玉曆當於三代更料有心積善建功為三界所舉五帝所保名在上天者取十萬人以充其任又當别舉一十二萬人以充儲官如此之例或以宿名玄圖或以骨像合仙或以滅度因緣轉輪或以篤好三寶善功徹天或供飬三寶為三官所稱或修齋奉戒功德積感或施散財寶建立道堂或救恤窮乏濟度天人或為三師建功充足天官有名考算簿録三官相應皆逆注種名上下有别毫分無遺又九幽之府被東華青宫九龍符命使拔九幽玉匱男女死魂宿名有善功德滿足應受開度者取三十二萬人以充甲申驅除之後開大有之民當此之時生死交會善惡分判得過者真為樂哉然三官相切文墨紛紜龍門受會鳥母督仙萬聖顯駕晝夜無間功過平等使生死無偏此之昏閙亦臣之憂矣大期既切觸事闕替恆恐一旦受罹公門伏聞天尊造大慈之化垂憐蒼生開九天之奧以濟兆民明科有禁戒非賤臣所可參聞然大數有期甲申垂終運度促急大法宜行使有心者得於考算之中聞於法音開示於視聽勸化於未悟者也緣兹上陳懼觸天顏願見哀愍賜所未聞於是天尊撫几髙抗凝神遐想仰誦洞章嘯詠琳琅良久忽然歎曰上範虛漠理微太幽道逹重玄氣冠神霄至極難言妙亦難超子既司帝位受任神王飛天翼於瓊闕四宰輔於明輪遐盻極覽領綜無窮雍和萬化撫料蒼生今大運啓期三五告辰百六應機陽九激揚洪泉鼓波萬災厲天四宫選舉以充種民三代昏亂善惡宜分子當勞心兆庶疲於三官興廢之際事須開能今以相委其勉之焉寶書妙重九天靈音施於上聖非鬼神所聞明真有格四萬劫一行今冒禁相付子祕之矣愼勿輕傳登命九天司馬侍仙玉開紫陽玉笈雲錦之囊出九天生神玉章四輔列位五老監真太一命辰玉帝唱盟一依俯仰明真具典南向長跪以付飛天無極神王法事既畢諸天復位天尊重告飛天神王此九天之章乃三洞飛玄之氣三會成音結成真文混合百神隱韻內名故太一試觀攝生十方領會洞虛啓誓丹青自無億劫因緣宿名帝圖不得參見得眄篇目九祖同仙當採擇其人應為仙者七百年中清齋千日齎金繒誓心依盟以傳愼之則享祚漏之則禍臻享祚則福延九祖德重山海招禍則考流億劫痛於毒湯風刀相刑可不愼之焉始青清微天寶章元始洞空無三氣精上門紫容觀太空四明植靈根妙化發東瓊三翩起西昆號應九玄清五華帶錦雲離羅煥神燈七精耀北玄飄飄上清畿奕奕帝一尊落落髙上章羽童何紛紛流香夲無色洞入萬仙羣左回三流劫右轉九天關金華纓玉童八風舞空輪四時無停機青白早明分九九改劫運三三度一春天地有終會祕激歸在翻洞明正一法嚴修六天文太平返空無奉翊後聖君元白禹餘靈寶章靈風起西門錦雲生東瓊三氣煥玉洲流香乘東輕玉華披風散倐忽朗九清騫林耀朱日黃水逐月生中有採芝童衣羽戴飛青飈景萬領風逍遙冥緑軿總御九空輪運開萬稽程左命三天文右攝六天兵檢氣返空洞六度應運傾劫運自有會誰測敗與成弘波輪靈罡六合無遺形白尸漂長流孤魂因復靈悲此去來際乃覺正法明至學加精修東華結瓊名欣有白簡人相與樂太平玄黃太赤神寶章洞關運天綱五氣輪三微紫戶吐瓊簡金門納神暉八會交真風晃朗重明開天際九清外落落髙神回三色返空無四候應玉畿河侯巳鼓筆五行潛相推六度無終劫運極乘氣歸萬魔羅天布羣凶竟吐威兆民負災衝積尸令人悲妙哉正法文理劫明不衰至時奉相迎契在九天飛與爾期太平放心無翮飛鬱單無量天生神章第一帝真胞命元元一黃演之氣混合空洞氣飛爽浮幽寥延康無期劫眇眇離本條苦魂沉九夜乘晨希陽翹大有通玄戶鬱單降晨霄黃雲凝靈府隂陽氣象交胞元結長命惡根應化消桃康合精延二帝秀玉飄灌溉胞命門精練神不雕九天命靈章生神神自超元君遏死路司馬誦洞謡一唱萬真和九遍諸天朝稽首恭劫年慶此榮舊苖上上禪善無量壽天生神章第二帝真胎命元洞𡨋紫戶之氣無量結紫戶氣尊天中王開度飛玄爽凝化輪空洞故根離昔愛緣本思舊宗幽夜淪遐劫對盡大運通帝真始明精號曰字元陽嬰兒伯史華結胎守黃房斬根斷死戶熙頥養嬰童禪善導靈氣玄哺飛天芳華景秀玉質精練自成容務玄育上生羅列備明堂太虛感靈會命我生神章一唱動九玄二誦天地通混合自相和九遍成人功大聖慶元吉散華禮太空諸天並歡恱一切稽首恭梵監須延天生神章第三帝真魂命元長靈明仙之氣須延總三雲玄元始氣分落落大梵布華景翠玉尊明梵飛玄景開度長夜魂遊爽赴期歸氣氣返故根大帝號陽堂字曰八靈君九開緑回道胎氣生上元陵梵度命籍太一輔精延泥丸敷帝席三部八景分魂生攝遊氣九轉自成仙琅琅九天音玉章生萬神三遍列正位氣參八辰門玄關過死戶靈鎮津液源應會感靈數明道潛回輪慶此嬰兒蛻稽首讃洞文寂然兜術天生神章第四帝真魄命元碭尸𡨋演由之氣寂然無色宗兜術抗大羅靈化四景分萬條翠朱霞遊魄不顧反一逝洞羣魔神公攝遊氣飄飄練素華榮秀椿劫期乘運應靈圖空洞生神章瓊音逸九霞一唱萬真會騫爽合成家九轉景靈備鬱鬱曜玉葩兜術開大有一慶享祚多上聖回帝駕嬰兒歘以歌不勝良晨會一切稽首和波羅尼蜜不驕樂天生神章第五帝真藏府命元五仙中靈之氣翻翻五帝駕飄飄玄上門遊步黃華野回靈驕樂端採集飛空景舊爽多不存太微回黃旗無英命靈幡攝召長夜府開度受生魂公子輔黃寧總録具形神五章洞幽靈五轉天地分氣練元藏府紫戶自生仙數周衆真會啓陽應感繁玉女灌五香聖母慶萬年三界並歡樂稽首禮天尊洞元化應聲天生神章第六帝真靈府命元髙真沖融之氣應聲無色界霄映冠十方回化輪無影冥期趣道場靈駕不待轡朗然生神章空洞諒無崖玄爽亦為疆練胎返本初長乘飛玄梁蘄畜喪天真散思候履常斬伐胞樹滯心遊超上京願會既玄玄悟我理兼忘介福九天端交禮地辰良混化歸元一髙結元始王稽首儔靈運長謝囂塵張靈化梵輔天生神章第七帝真元府命元髙仙洞笈之氣玄會統無崖混氣歸梵輔務猷運靈化潛推無寒暑乘數搆貞條振袂拂輕羽瓊房有妙韻泛登髙神所圓輪無停映真仙參列序上上霄衢邈洞元深萬巨秀葉翳翠霞停蔭清泠渚遨玩怡五神繁想嘯明侣五難緣理去沖心自怡處爽魂隨本根亹亹空中佇七誦重關開豁滯非神武運通由中發髙唱稽首舉髙虛清明天生神章第八帝真華府命元真靈化凝之氣清明重霄上合期慶雲際玉章散沖心孤景要靈會煥落景霞布神襟靡不邁玉條流逸響從容虛妙話靈音振空洞九玄離幽裔感爽無凝滯去留如解帶明識生神章髙遊無終敗玄景曜雲衢迹超神方外應感無方圓𦕅以運四大研心稽首誦衆聖共稱快無想無結無愛天生神章第九帝真神府命元自然玄照之氣無結固無情玄玄虛中澄輪化無方序數來亦叵乘誰云無色平峨峨多丘陵𡨋心縱一往髙期清神徵良遇非年嵗劫數安可稱浮爽緣故條返胎自有靈感洞太虛飛步霄上氷津趣鼓萬流潛凝真神登無愛固無憂髙觀稽首升太極真人頌二首大道雖無心可以有情求佇駕空洞中回盻翳滄流淨明三界外蕭蕭玉京遊自無玄挺運誰能悟冥趣落落天漢澄俯仰即虛柔七玄散幽裔返胎順沈浮冥期苟潛凝陽九無虞憂覩此去來會時復為淹留外身而身存真仙會良儔亹亹玄中趣湛湛清漢波代謝若旋環椿木不改柯靜心念至真隨運順離羅感應理常通神識逮自徂淡遊初無際繁想洞九霞飛根散玄葉理反非有它常能誦玉章玄音徹霄遐甲申洪災至控翮王毋家永享無終紀豈知年劫多洞玄靈寶自然九天生神章經終誦經應驗蜀青城山乃神仙會府昔蜀主孟昶往祈見女真麻姑致齋壇側青城令有獻美女張氏遂納之名之曰麗華同處于丈人觀忽一夕迅雷掣電暴雨猛風掀拔屋宇騰空散落張氏遂殞命葬山下後數十年上元節丈人觀道士李若沖夜歸憩於山前忽竹隂有一女子號泣而出詣若沖前賦詩云獨卧經秋墮鬢蟬白楊風起不成眠澄思往日椒房寵淚濕衣襟損翠鈿言訖復泣而退若沖還觀見丈人殿上有衣冠朱履之士皆靣北立如有奏對殿下廊廡間列諸罪人見獄卒引一女子縶於鐵柱杖之號呌痛楚徐察之乃山前逢之者俄頃善神以劔指若沖曰今夕上元天官自五嶽丈人校勘生死罪目不冝久立若沖乃潛避達旦具白其師唐洞卿唐曰汝知之乎此乃張麗華也昔寵幸於此褻瀆上真致獲斯罪既以詩告汝汝當救之曰何法可救曰但轉九天生神章九卷奏金籙白簡可免斯苦即自託生偶遇臨卭牧田魯儔設黃籙若沖遂置簡書疏轉經十過投仗醮所因而救度誦至九卷適丁焚簡之時若沖即回向而之明日張氏所葬之地有沙字四句云符吏匆匆扣夜扃便隨金簡出幽冥蒙師薦拔恩非淺領得生神九過經若沖諦觀太上垂教憫諸衆生故立救拔之門以濟生死之路鳴呼世人欲濟度先亡者誠當崇此瓊文為超脫之捷徑謹書于經末以為崇奉之勸云
